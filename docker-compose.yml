# gSage AI — Docker Compose
# All services on internal network. Ollama runs as a managed service (gsage-ollama).

services:
  # ── Data Stores ──────────────────────────────────────────────

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.3
    container_name: gsage-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-ollama'
      ENABLE_MODULES: 'text2vec-ollama'
      OLLAMA_API_ENDPOINT: 'http://ollama:11434'
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - gsage-internal
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  postgres:
    image: postgres:16
    container_name: gsage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CURATOR_DB_USER: ${CURATOR_DB_USER:-curator}
      CURATOR_DB_PASSWORD: ${CURATOR_DB_PASSWORD:-curator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-curator.sh:/docker-entrypoint-initdb.d/init-curator.sh:ro
      - ./docker/postgres/init-wikijs.sh:/docker-entrypoint-initdb.d/init-wikijs.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: gsage-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: gsage-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=gsage-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - gsage-internal
    # Expose Elasticsearch for local development/debugging
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: gsage-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=gsage-kibana
      - SERVER_HOST=0.0.0.0
      - SERVER_BASEPATH=/kibana
      - SERVER_REWRITEBASEPATH=true
      - TELEMETRY_ENABLED=false
    networks:
      - gsage-internal
    # No public port: reached via http://<host>:${FRONTEND_PORT}/kibana/
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── MinIO (Object Storage — Tool Artifacts) ─────────────────

  minio:
    image: minio/minio:RELEASE.2024-07-13T01-46-15Z
    container_name: gsage-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-gsage}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-CHANGE-ME-strong-password}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console (dev only)
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Ollama (LLM & Embedding Server) ─────────────────────────────

  ollama:
    image: ollama/ollama:latest
    container_name: gsage-ollama
    restart: unless-stopped
    environment:
      OLLAMA_MAKER_MODEL: ${OLLAMA_MAKER_MODEL:-}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-ctx8k}
      OLLAMA_EMBED_NUM_CTX: ${OLLAMA_EMBED_NUM_CTX:-8192}
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    ports:
      - "11434:11434"
    networks:
      - gsage-internal
    healthcheck:
      # Passes only after the custom embedding model is successfully created.
      test: ["CMD-SHELL", "ollama list | grep -q ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-ctx8k}"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 600s
    #deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        # Remove this block for CPU-only mode (no NVIDIA GPU).
    #        - driver: nvidia
    #          count: all
    #          capabilities: [gpu]

  # ── Backend_api (FastAPI) ────────────────────────────────────────

  backend_api:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    #   target: runtime-minimal
    image: gsage-python-dev-image
    container_name: gsage-backend_api
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway" 
    environment:
      # Suppress all DeprecationWarning
      PYTHONWARNINGS: "ignore::DeprecationWarning"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./alembic.ini:/app/alembic.ini
      - ./requirements.txt:/app/requirements.txt
      - ingest_tmp:/data/ingest
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && alembic upgrade head
      && python -W ignore::DeprecationWarning -m gunicorn -k uvicorn.workers.UvicornWorker src.backend_api.app.main:app --bind 0.0.0.0:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 20s
      retries: 3
      start_period: 15s

  # ── MCP Server (FastMCP — Tool Execution) ────────────────────

  mcp-server:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    #   target: runtime-mermaid
    image: gsage-python-dev-image
    container_name: gsage-mcp-server
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"  # For accessing host services (e.g., local SMTP server) from within Docker
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - ./custom_code:/app/custom_code
      - ./dbs:/app/dbs
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -W ignore::DeprecationWarning -m uvicorn src.mcp_server.main:app --host 0.0.0.0 --port 8001"
    # No ports exposed to host — only accessible within Docker network
    networks:
      - gsage-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      ollama:
        condition: service_healthy
      backend_api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 20s

  # ── Celery Workers ───────────────────────────────────────────

  celery-worker-default:
    image: gsage-python-dev-image
    container_name: gsage-celery-default
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"  # For accessing host services (e.g., local SMTP server) from within Docker
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - ./custom_code:/app/custom_code
      - ./dbs:/app/dbs
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker --queues=celery --concurrency=1 --loglevel=info -n default@%h"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker-tools:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    #   target: runtime-tools
    image: gsage-python-dev-image
    container_name: gsage-celery-tools
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"  # For accessing host services (e.g., local SMTP server) from within Docker
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - ./custom_code:/app/custom_code
      - ./dbs:/app/dbs
    # whatweb / tshark / texlive are baked into the dev image (target=dev in docker/Dockerfile);
    # no runtime apt-get needed.
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker --queues=tools --concurrency=2 --loglevel=info -n tools@%h"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    networks:
      - gsage-internal
    cap_add:
      - NET_RAW
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker-email:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    #   target: runtime-minimal
    image: gsage-python-dev-image
    container_name: gsage-celery-email
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"  # For accessing host services (e.g., local SMTP server) from within Docker
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - ./custom_code:/app/custom_code
      - ./dbs:/app/dbs
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker --queues=email --concurrency=2 --loglevel=info -n email@%h"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker-scheduled:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    #   target: runtime-minimal
    image: gsage-python-dev-image
    container_name: gsage-celery-scheduled
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"  # For accessing host services (e.g., local SMTP server) from within Docker
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - ./custom_code:/app/custom_code
      - ./dbs:/app/dbs
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker --queues=scheduled --concurrency=1 --loglevel=info -n scheduled@%h"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker-knowledge:
    image: gsage-python-dev-image
    container_name: gsage-celery-knowledge
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"  # For accessing host services (e.g., local SMTP server) from within Docker
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
      - ./knowledge_base:/app/knowledge_base
      - ./docs:/app/docs:ro
      - ingest_tmp:/data/ingest
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker --queues=knowledge --concurrency=2 --loglevel=info -n knowledge@%h"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 768M

  celery-worker-elasticsearch:
    image: gsage-python-dev-image
    container_name: gsage-celery-elasticsearch
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"  # For accessing host services (e.g., local SMTP server) from within Docker
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker --queues=elasticsearch --concurrency=1 --loglevel=info -n elasticsearch@%h"
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 256M

  celery-beat:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    #   target: runtime-minimal
    image: gsage-python-dev-image
    container_name: gsage-celery-beat
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"  # For accessing host services (e.g., local SMTP server) from within Docker
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app beat --scheduler=redbeat.RedBeatScheduler --loglevel=info"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Email Worker (IMAP/SMTP) ─────────────────────────────────

  # ── Web Client (React SPA) ───────────────────────────────────

  frontend:
    build:
      context: ./web_client
      dockerfile: Dockerfile
    container_name: gsage-frontend
    restart: unless-stopped
    environment:
      # dev profile proxies /api, /lists, /kibana and /wikijs through nginx.
      GSAGE_NGINX_PROFILE: dev
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend_api:
        condition: service_healthy
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Wiki.js (Documentation Wiki) ──────────────────────────

  wikijs:
    image: ghcr.io/requarks/wiki:2
    container_name: gsage-wikijs
    restart: unless-stopped
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${WIKIJS_DB_USER:-wikijs}
      DB_PASS: ${WIKIJS_DB_PASSWORD:-wikijs}
      DB_NAME: wikijs
    # No public port: reached via http://<host>:${FRONTEND_PORT}/wikijs/
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Curator (Reputation List Management) ────────────────────

  curator:
    image: gsage-python-dev-image
    container_name: gsage-curator
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./curator/app:/app/app
      - ./curator/requirements.txt:/app/requirements.txt
      - curator_data:/data
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -W ignore::DeprecationWarning -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M

  email-worker:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    #   target: runtime-minimal
    image: gsage-python-dev-image
    container_name: gsage-email-worker
    restart: unless-stopped
    extra_hosts:
      - "mail:host-gateway"  # For accessing host services (e.g., local SMTP server) from within Docker
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -m src.email_worker.main"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend_api:
        condition: service_healthy
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 512M

  telegram-worker:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    #   target: runtime-minimal
    image: gsage-python-dev-image
    container_name: gsage-telegram-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt
    command: >
      bash -c "pip install --quiet -r requirements.txt
      && python -m src.telegram_worker.main"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend_api:
        condition: service_healthy
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 256M

# ── Networks ─────────────────────────────────────────────────

networks:
  gsage-internal:
    driver: bridge
    # All services communicate over this internal network.
    # No service except backend (8000) and flask-ui (5000) exposes ports to the host.
    # Elasticsearch and MCP server are NOT accessible from outside Docker.

# ── Volumes ──────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  weaviate_data:
  minio_data:
  ingest_tmp:
  ollama_data:
  curator_data:
