#
# web_client/nginx.prod.conf — production reverse-proxy profile.
# Selected by the entrypoint when GSAGE_NGINX_PROFILE=prod (default).
#
# Public surface in production is a SINGLE port (the frontend). Only /api
# (backend_api) and /lists (curator) are proxied. Kibana and Wiki.js are not
# part of the production baseline.
#
server {
    listen 80;
    server_name _;

    # Allow uploads up to 220 MB (matches backend attachment limit).
    client_max_body_size 220M;

    root /usr/share/nginx/html;
    index index.html;

    # Hide server version from responses.
    server_tokens off;

    # Gzip for text-like responses.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache for hashed static assets.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → backend_api ──────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_api:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE upgrade support.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Streaming: disable buffering, allow long-lived connections.
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         600s;
        proxy_send_timeout         600s;
        chunked_transfer_encoding  on;
    }

    # ── Curator reputation lists ─────────────────────────────────────
    location /lists/ {
        proxy_pass http://curator:8000/data/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── SPA fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
