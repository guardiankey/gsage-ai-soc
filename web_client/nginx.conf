#
# web_client/nginx.conf — development reverse-proxy profile.
# Selected by the entrypoint when GSAGE_NGINX_PROFILE=dev.
#
# Proxies everything through a single origin so devs can work without CORS:
#   /api     → backend_api:8000
#   /lists   → curator:8000/data
#   /kibana  → kibana:5601   (Kibana is configured with basePath /kibana)
#   /wikijs  → wikijs:3000   (Wiki.js is configured with WIKI_PATH_BASE=/wikijs)
#
server {
    listen 80;
    server_name _;

    # Allow uploads up to 1 GB.
    client_max_body_size 1024M;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → backend_api ──────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_api:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         600s;
        proxy_send_timeout         600s;
        chunked_transfer_encoding  on;
    }

    # ── Curator reputation lists ─────────────────────────────────────
    location /lists/ {
        proxy_pass http://curator:8000/data/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Kibana ───────────────────────────────────────────────────────
    # Requires kibana service configured with SERVER_BASEPATH=/kibana and
    # SERVER_REWRITEBASEPATH=true.
    location /kibana/ {
        proxy_pass http://kibana:5601;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
    }

    # Redirect /kibana → /kibana/ so Kibana's relative assets resolve.
    location = /kibana {
        return 301 /kibana/;
    }

    # ── Wiki.js ──────────────────────────────────────────────────────
    # Wiki.js 2.x does not support running under a sub-path reliably;
    # this block works for the landing page and most views when the
    # container is reached directly from the same origin.
    location /wikijs/ {
        proxy_pass http://wikijs:3000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
    }
    location = /wikijs {
        return 301 /wikijs/;
    }

    # ── SPA fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
server {
    listen 80;
    server_name _;

    # Allow uploads up to 1 GB (attachment limit in backend is 1 GB)
    client_max_body_size 1024M;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API proxy → backend_api container
    location /api/ {
        proxy_pass http://backend_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Curator reputation lists proxy
    location /lists/ {
        proxy_pass http://curator:8000/data/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
