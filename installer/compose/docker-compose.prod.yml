# gSage AI — Docker Compose (release / production)
#
# Generated by the installer. All images are pulled from a remote registry —
# there are NO `build:` blocks here. Dev-time bind mounts (`./src`, `./custom_code`,
# `./dbs`) are removed; only named volumes and host paths anchored under
# ${GSAGE_INSTALL_DIR} are used.
#
# Image naming contract:
#   ${GSAGE_IMAGE_REGISTRY}/gsage-backend_api:${GSAGE_VERSION}
#   ${GSAGE_IMAGE_REGISTRY}/gsage-worker_tools:${GSAGE_VERSION}
#   ${GSAGE_IMAGE_REGISTRY}/gsage-mcp_server:${GSAGE_VERSION}
#   ${GSAGE_IMAGE_REGISTRY}/gsage-frontend:${GSAGE_VERSION}
#   ${GSAGE_IMAGE_REGISTRY}/gsage-curator:${GSAGE_VERSION}

services:
  # ── Data Stores ──────────────────────────────────────────────

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.3
    container_name: gsage-weaviate
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-ollama'
      ENABLE_MODULES: 'text2vec-ollama'
      OLLAMA_API_ENDPOINT: 'http://ollama:11434'
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - gsage-internal
    # Bind to loopback so the host-side admin console (gsage-admin) can reach
    # Weaviate without exposing it externally. Backends inside the docker
    # network keep using the service name `weaviate:8080`.
    # REST is published on 18080 to avoid colliding with FRONTEND_PORT=8080.
    ports:
      - "127.0.0.1:${WEAVIATE_HOST_PORT:-18080}:8080"
      - "127.0.0.1:${WEAVIATE_GRPC_HOST_PORT:-50051}:50051"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  postgres:
    image: postgres:16
    container_name: gsage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CURATOR_DB_USER: ${CURATOR_DB_USER:-curator}
      CURATOR_DB_PASSWORD: ${CURATOR_DB_PASSWORD:-curator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${GSAGE_INSTALL_DIR}/docker/postgres/init-curator.sh:/docker-entrypoint-initdb.d/init-curator.sh:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: gsage-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: gsage-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=gsage-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - gsage-internal
    ports:
      - "127.0.0.1:9200:9200"
    healthcheck:
      # Wait until cluster reaches at least 'yellow' status: a 200 from
      # /_cluster/health alone is not enough because ES answers HTTP while
      # internal APIs (ILM, indices) are still initialising, which causes
      # backend_api startup to hit a 'connection refused' / partial-init race.
      test: ["CMD-SHELL", "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G

  minio:
    image: minio/minio:RELEASE.2024-07-13T01-46-15Z
    container_name: gsage-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-gsage}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  ollama:
    image: ollama/ollama:latest
    container_name: gsage-ollama
    restart: unless-stopped
    environment:
      OLLAMA_MAKER_MODEL: ${OLLAMA_MAKER_MODEL:-}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-ctx8k}
      OLLAMA_EMBED_NUM_CTX: ${OLLAMA_EMBED_NUM_CTX:-8192}
    volumes:
      - ollama_data:/root/.ollama
      - ${GSAGE_INSTALL_DIR}/docker/ollama/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-ctx8k}"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 600s

  # ── Application services ─────────────────────────────────────

  backend_api:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-backend_api:${GSAGE_VERSION}
    container_name: gsage-backend_api
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"
    environment:
      PYTHONWARNINGS: "ignore::DeprecationWarning"
    # No public port: backend_api is reached exclusively via the frontend
    # reverse proxy at http://<host>:${FRONTEND_PORT}/api/
    volumes:
      - ingest_tmp:/data/ingest
    command: >
      bash -c "alembic upgrade head
      && python -W ignore::DeprecationWarning -m gunicorn -k uvicorn.workers.UvicornWorker src.backend_api.app.main:app --bind 0.0.0.0:8000"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      elasticsearch: {condition: service_healthy}
      weaviate: {condition: service_healthy}
      minio: {condition: service_healthy}
      ollama: {condition: service_healthy}
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  mcp-server:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-mcp_server:${GSAGE_VERSION}
    container_name: gsage-mcp-server
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"
    volumes:
      - ${GSAGE_DBS_PATH:-/opt/gsage/shared/dbs}:/app/dbs:ro
      - ${GSAGE_CUSTOM_CODE_PATH:-/opt/gsage/shared/custom_code}:/app/custom_code:ro
    command: >
      bash -c "python -W ignore::DeprecationWarning -m uvicorn src.mcp_server.main:app --host 0.0.0.0 --port 8001"
    networks:
      - gsage-internal
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      elasticsearch: {condition: service_healthy}
      weaviate: {condition: service_healthy}
      ollama: {condition: service_healthy}
      backend_api: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s

  celery-worker-default:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-backend_api:${GSAGE_VERSION}
    container_name: gsage-celery-default
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"
    command: >
      python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker
      --queues=celery --concurrency=1 --loglevel=info -n default@%h
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      elasticsearch: {condition: service_healthy}
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker-tools:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-worker_tools:${GSAGE_VERSION}
    container_name: gsage-celery-tools
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"
    volumes:
      - ${GSAGE_DBS_PATH:-/opt/gsage/shared/dbs}:/app/dbs:ro
      - ${GSAGE_CUSTOM_CODE_PATH:-/opt/gsage/shared/custom_code}:/app/custom_code:ro
    command: >
      python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker
      --queues=tools --concurrency=2 --loglevel=info -n tools@%h
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      elasticsearch: {condition: service_healthy}
      weaviate: {condition: service_healthy}
    networks:
      - gsage-internal
    cap_add:
      - NET_RAW
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker-email:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-backend_api:${GSAGE_VERSION}
    container_name: gsage-celery-email
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"
    command: >
      python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker
      --queues=email --concurrency=2 --loglevel=info -n email@%h
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker-scheduled:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-backend_api:${GSAGE_VERSION}
    container_name: gsage-celery-scheduled
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"
    command: >
      python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker
      --queues=scheduled --concurrency=1 --loglevel=info -n scheduled@%h
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 512M

  celery-worker-knowledge:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-backend_api:${GSAGE_VERSION}
    container_name: gsage-celery-knowledge
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"
    volumes:
      - ${GSAGE_KB_PATH:-/opt/gsage/shared/knowledge_base}:/app/knowledge_base
      - ingest_tmp:/data/ingest
    command: >
      python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker
      --queues=knowledge --concurrency=2 --loglevel=info -n knowledge@%h
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      weaviate: {condition: service_healthy}
      ollama: {condition: service_healthy}
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 768M

  celery-worker-elasticsearch:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-backend_api:${GSAGE_VERSION}
    container_name: gsage-celery-elasticsearch
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"
    command: >
      python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app worker
      --queues=elasticsearch --concurrency=1 --loglevel=info -n elasticsearch@%h
    depends_on:
      redis: {condition: service_healthy}
      elasticsearch: {condition: service_healthy}
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 256M

  celery-beat:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-backend_api:${GSAGE_VERSION}
    container_name: gsage-celery-beat
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"
    command: >
      python -W ignore::DeprecationWarning -m celery -A src.backend_api.app.celery_app beat
      --scheduler=redbeat.RedBeatScheduler --loglevel=info
    depends_on:
      redis: {condition: service_healthy}
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 128M

  email-worker:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-backend_api:${GSAGE_VERSION}
    container_name: gsage-email-worker
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "mail:host-gateway"
    command: python -m src.email_worker.main
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      backend_api: {condition: service_healthy}
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 512M

  telegram-worker:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-backend_api:${GSAGE_VERSION}
    container_name: gsage-telegram-worker
    restart: unless-stopped
    env_file: .env
    command: python -m src.telegram_worker.main
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      backend_api: {condition: service_healthy}
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-frontend:${GSAGE_VERSION}
    container_name: gsage-frontend
    restart: unless-stopped
    environment:
      GSAGE_NGINX_PROFILE: prod
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend_api:
        condition: service_healthy
    networks:
      - gsage-internal
    deploy:
      resources:
        limits:
          memory: 64M

  curator:
    image: ${GSAGE_IMAGE_REGISTRY:-guardiankey}/gsage-curator:${GSAGE_VERSION}
    container_name: gsage-curator
    restart: unless-stopped
    env_file: .env
    volumes:
      - curator_data:/data
    depends_on:
      postgres: {condition: service_healthy}
    networks:
      - gsage-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  gsage-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  weaviate_data:
  minio_data:
  ingest_tmp:
  ollama_data:
  curator_data:
