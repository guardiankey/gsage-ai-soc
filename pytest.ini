[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (no external deps)
    integration: Integration tests (may need mocks for external deps)
    security: Security tests (MANDATORY per PROMPT.md Phase 10)
    fuzz: Fuzz tests (MANDATORY for tools)
    compras_live: Live tests for comprasgovbr + pncp_contratos (require COMPRAS_LIVE=1)
    sei_live: Live tests for SEI-PEN tools (require SEI_* env vars via source limbo/sei.sh)
    sei_write: SEI-PEN write tests that create permanent artifacts (require SEI_ALLOW_WRITE=1)
    trellix_live: Live tests for Trellix EDR tools (require TRELLIX_CLIENT_ID etc. via source limbo/trellix.sh)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::authlib.deprecate.AuthlibDeprecationWarning
