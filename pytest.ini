[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (no external deps)
    integration: Integration tests (may need mocks for external deps)
    security: Security tests (MANDATORY per PROMPT.md Phase 10)
    fuzz: Fuzz tests (MANDATORY for tools)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::authlib.deprecate.AuthlibDeprecationWarning
